name: Deploy watersedge-phase2-snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/watersedge-phase2-snapshot/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy
        run: npx wrangler deploy
        working-directory: workers/watersedge-phase2-snapshot
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
