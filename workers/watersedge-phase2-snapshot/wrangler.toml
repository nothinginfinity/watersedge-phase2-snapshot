name = "watersedge-phase2-snapshot"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

[vars]
DEMO_SLUG = "watersedge"

[[d1_databases]]
binding = "DEMO_DB"
database_name = "afo-demo-db"
database_id = "00eddd4b-7e18-490f-83b5-e0ec1cb3dd8b"

[[kv_namespaces]]
binding = "DEMO_KV"
id = "c861bd0c228e48a99a059bfc721821f8"

[[r2_buckets]]
binding = "DEMO_R2"
bucket_name = "afo-demo-assets"

[[vectorize]]
binding = "DEMO_VECTOR"
index_name = "watersedge-afo-vector"
